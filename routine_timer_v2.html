<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ルーティンタイマー">
<title>業務用ルーティンタイマー</title>
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-mid: #AFA9EC;
    --purple-dark: #3C3489;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-mid: #9FE1CB;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-mid: #F7C1C1;
    --radius: 10px;
    --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #666;
      --purple-light: #2a2860;
      --purple-mid: #534AB7;
      --teal-light: #0a2e22;
      --amber-light: #2e1e00;
      --red-light: #2e0f0f;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  svg.ic { display:inline-block; vertical-align:-3px; flex-shrink:0; }

  #setupScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .setup-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:28px; width:100%; max-width:520px; }
  .setup-card h1 { font-size:17px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .setup-card > p { font-size:13px; color:var(--text2); margin-bottom:20px; margin-top:8px; line-height:1.5; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:500; }
  .field input { width:100%; padding:9px 12px; font-size:13px; border:0.5px solid var(--border2); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-family:inherit; outline:none; }
  .field input:focus { border-color:var(--purple); }
  .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
  .btn { display:inline-flex; align-items:center; gap:5px; padding:8px 16px; font-size:13px; font-family:inherit; border:0.5px solid var(--border2); border-radius:var(--radius-sm); background:var(--surface); color:var(--text); cursor:pointer; transition:all .12s; font-weight:500; }
  .btn:hover { background:var(--surface2); }
  .btn.primary { background:var(--purple-light); border-color:var(--purple-mid); color:var(--purple-dark); }
  .btn.primary:hover { filter:brightness(.95); }
  .btn.success { background:var(--teal-light); border-color:var(--teal-mid); color:var(--teal); }
  .btn.danger { background:var(--red-light); border-color:var(--red-mid); color:var(--red); }
  .btn.sm { padding:4px 9px; font-size:12px; }
  .btn.icon-btn { padding:4px 7px; }
  .notice { font-size:11px; color:var(--text3); margin-top:12px; line-height:1.6; }

  #mainApp { display:none; max-width:960px; margin:0 auto; padding:12px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:10px 14px; margin-bottom:10px; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar h1 { font-size:15px; font-weight:600; display:flex; align-items:center; gap:7px; }
  .sync-pill { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); padding:3px 10px; border:0.5px solid var(--border); border-radius:20px; }
  .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--red); flex-shrink:0; }
  .sync-dot.on { background:var(--teal); }

  .date-tabs { display:flex; gap:6px; margin-bottom:10px; overflow-x:auto; padding-bottom:2px; }
  .tab { padding:7px 18px; border:0.5px solid var(--border); border-radius:var(--radius-sm); font-size:13px; cursor:pointer; background:var(--surface); color:var(--text2); white-space:nowrap; font-family:inherit; font-weight:500; transition:all .12s; }
  .tab.active { background:var(--purple-light); border-color:var(--purple-mid); color:var(--purple-dark); }

  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .cell { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:12px; min-height:172px; display:flex; flex-direction:column; cursor:grab; transition:border-color .15s, opacity .15s; }
  .cell:active { cursor:grabbing; }
  .cell.dragging { opacity:.45; }
  .cell.drag-over { border-color:var(--purple); border-width:1.5px; background:var(--purple-light); }
  .cell.done { opacity:.65; border-style:dashed; }
  .cell-label { font-size:10px; font-weight:600; letter-spacing:.6px; color:var(--text3); margin-bottom:7px; user-select:none; }
  .task-input { flex:1; font-size:13px; color:var(--text); border:none; background:transparent; width:100%; resize:none; font-family:inherit; line-height:1.5; outline:none; min-height:44px; }
  .task-input::placeholder { color:var(--text3); }
  .task-done-text { font-size:13px; color:var(--text2); flex:1; line-height:1.5; }

  .timer-area { margin-top:8px; }
  .timer-bar-wrap { height:3px; background:var(--surface2); border-radius:2px; margin-bottom:7px; overflow:hidden; }
  .timer-bar-fill { height:100%; border-radius:2px; background:var(--purple); transition:width .8s linear; }
  .timer-bar-fill.warn { background:var(--amber); }
  .timer-bar-fill.danger { background:var(--red); }
  .timer-display { font-size:24px; font-weight:600; letter-spacing:-1px; font-variant-numeric:tabular-nums; margin-bottom:8px; color:var(--text); }
  .timer-display.warn { color:var(--amber); }
  .timer-display.danger { color:var(--red); }
  .timer-display.done-label { font-size:14px; color:var(--teal); font-weight:500; letter-spacing:0; display:flex; align-items:center; gap:5px; }
  .timer-controls { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .min-input { width:52px; font-size:12px; padding:4px 7px; border:0.5px solid var(--border2); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-family:inherit; text-align:center; }
  .min-label { font-size:11px; color:var(--text3); }

  .completed-wrap { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:16px; }
  .completed-wrap h2 { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .c-item { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; background:var(--surface2); border-radius:var(--radius-sm); margin-bottom:7px; font-size:13px; }
  .c-check { color:var(--teal); flex-shrink:0; margin-top:1px; }
  .c-task { flex:1; line-height:1.4; }
  .c-meta { font-size:11px; color:var(--text3); white-space:nowrap; text-align:right; }
  .empty { font-size:13px; color:var(--text3); text-align:center; padding:18px; }

  @media (max-width:480px) {
    .grid { gap:5px; }
    .cell { min-height:148px; padding:9px; }
    .timer-display { font-size:20px; }
    .topbar h1 { font-size:14px; }
  }
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setupScreen">
  <div class="setup-card">
    <h1>
      <svg class="ic" width="20" height="20"><use href="#ic-grid"/></svg>
      業務用ルーティンタイマー
    </h1>
    <p>Firebase Realtime Database を使ってPC・iPhone・Androidでデータを自動同期できます。同期不要の場合はローカルモードで開始してください。</p>

    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px">Firebase 設定（任意）</div>
    <div class="field"><label>API Key</label><input id="cfg-apiKey" placeholder="AIzaSy..." autocomplete="off"></div>
    <div class="field"><label>Auth Domain</label><input id="cfg-authDomain" placeholder="your-project.firebaseapp.com" autocomplete="off"></div>
    <div class="field"><label>Project ID</label><input id="cfg-projectId" placeholder="your-project-id" autocomplete="off"></div>
    <div class="field"><label>Database URL</label><input id="cfg-dbUrl" placeholder="https://your-project-default-rtdb.asia-southeast1.firebasedatabase.app" autocomplete="off"></div>

    <div class="btn-row">
      <button class="btn primary" onclick="connectFirebase()">
        <svg class="ic" width="15" height="15"><use href="#ic-cloud"/></svg> Firebaseで接続・開始
      </button>
      <button class="btn" onclick="startLocal()">
        <svg class="ic" width="15" height="15"><use href="#ic-laptop"/></svg> ローカルのみで開始
      </button>
    </div>
    <p class="notice">
      ※ Firebase設定はブラウザに保存されます。他端末でも同じ設定を入力すると自動同期されます。<br>
      ※ Firebaseコンソール → Realtime Database → ルール で <code style="font-size:11px">".read":true, ".write":true</code> を設定してください。
    </p>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-left">
      <h1>
        <svg class="ic" width="17" height="17"><use href="#ic-grid"/></svg>
        ルーティンタイマー
      </h1>
      <div class="sync-pill">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">未接続</span>
      </div>
    </div>
    <button class="btn sm" onclick="showSetup()">
      <svg class="ic" width="14" height="14"><use href="#ic-settings"/></svg> 設定
    </button>
  </div>

  <div class="date-tabs" id="dateTabs"></div>
  <div class="grid" id="taskGrid"></div>

  <div class="completed-wrap">
    <h2>
      <svg class="ic" width="15" height="15" style="color:var(--teal)"><use href="#ic-check-circle"/></svg>
      完了タスク
    </h2>
    <div id="completedList"><p class="empty">完了タスクはありません</p></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>

<script>
const LSKEY = 'routine_timer_v3';
const CFGKEY = 'routine_timer_cfg';
let db = null, isFirebase = false, currentDay = 0;
let dragSrc = null;
let timers = {};
let appData = null;

function ic(id, size) {
  size = size || 14;
  return `<svg class="ic" width="${size}" height="${size}"><use href="#ic-${id}"/></svg>`;
}

/* ─── DATA ─── */
function defaultData() {
  const d = { days: [], completed: [] };
  for (let i = 0; i < 3; i++) {
    d.days[i] = { cells: [] };
    for (let j = 0; j < 9; j++) {
      d.days[i].cells[j] = { task:'', timerMin:30, elapsed:0, running:false, completed:false, completedAt:null, order:j };
    }
  }
  return d;
}
function ensureData() {
  if (!appData) appData = defaultData();
  if (!appData.days) appData.days = [];
  if (!appData.completed) appData.completed = [];
  for (let d = 0; d < 3; d++) {
    if (!appData.days[d]) appData.days[d] = { cells: [] };
    if (!appData.days[d].cells) appData.days[d].cells = [];
    for (let i = 0; i < 9; i++) {
      if (!appData.days[d].cells[i]) {
        appData.days[d].cells[i] = { task:'', timerMin:30, elapsed:0, running:false, completed:false, completedAt:null, order:i };
      }
    }
  }
}
function saveData() {
  if (isFirebase && db) {
    db.ref('routineTimer').set(JSON.parse(JSON.stringify(appData)));
  } else {
    try { localStorage.setItem(LSKEY, JSON.stringify(appData)); } catch(e) {}
  }
}
function tickSave() {
  if (!isFirebase) {
    try { localStorage.setItem(LSKEY, JSON.stringify(appData)); } catch(e) {}
  }
}

/* ─── DATE ─── */
function getDates() {
  return [0,1,2].map(i => { const d = new Date(); d.setDate(d.getDate()+i); return d; });
}
const DOW = ['日','月','火','水','木','金','土'];
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`; }
function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function pad(n) { return String(n).padStart(2,'0'); }

/* ─── FIREBASE ─── */
function connectFirebase() {
  const cfg = {
    apiKey: document.getElementById('cfg-apiKey').value.trim(),
    authDomain: document.getElementById('cfg-authDomain').value.trim(),
    projectId: document.getElementById('cfg-projectId').value.trim(),
    databaseURL: document.getElementById('cfg-dbUrl').value.trim()
  };
  if (!cfg.apiKey || !cfg.databaseURL) { alert('API Key と Database URL は必須です'); return; }
  try {
    if (firebase.apps.length) firebase.apps.forEach(a => a.delete());
    firebase.initializeApp(cfg);
    db = firebase.database();
    isFirebase = true;
    localStorage.setItem(CFGKEY, JSON.stringify(cfg));
    document.getElementById('syncDot').classList.add('on');
    document.getElementById('syncLabel').textContent = '同期中';
    db.ref('routineTimer').on('value', snap => {
      stopAllTimers();
      if (snap.exists()) { appData = snap.val(); } else { appData = defaultData(); db.ref('routineTimer').set(appData); }
      ensureData();
      renderAll();
      startRunningTimers();
    });
    launchApp();
  } catch(e) { alert('Firebase接続エラー: ' + e.message); }
}
function startLocal() {
  isFirebase = false;
  try { const s = localStorage.getItem(LSKEY); if (s) appData = JSON.parse(s); } catch(e) {}
  if (!appData) appData = defaultData();
  ensureData();
  document.getElementById('syncDot').classList.remove('on');
  document.getElementById('syncLabel').textContent = 'ローカル';
  launchApp();
}
function showSetup() {
  stopAllTimers();
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}
function launchApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  buildTabs();
  renderAll();
  startRunningTimers();
}

/* ─── TABS ─── */
function buildTabs() {
  const el = document.getElementById('dateTabs');
  el.innerHTML = '';
  getDates().forEach((d, i) => {
    const t = document.createElement('button');
    t.className = 'tab' + (i === currentDay ? ' active' : '');
    t.textContent = (i===0?'今日 ': i===1?'明日 ':'明後日 ') + fmtDate(d);
    t.onclick = () => { currentDay = i; buildTabs(); renderGrid(); };
    el.appendChild(t);
  });
}

/* ─── CELL ─── */
function getCiBySlot(slot) {
  const cells = appData.days[currentDay].cells;
  const ci = cells.findIndex(c => (c.order ?? cells.indexOf(c)) === slot);
  return ci >= 0 ? ci : slot;
}

function renderAll() { buildTabs(); renderGrid(); renderCompleted(); }

function renderGrid() {
  const grid = document.getElementById('taskGrid');
  grid.innerHTML = '';
  const cells = appData.days[currentDay].cells;
  const slotMap = Array(9).fill(null);
  cells.forEach((c, i) => {
    const o = c.order ?? i;
    if (o < 9 && slotMap[o] === null) slotMap[o] = i;
  });

  for (let slot = 0; slot < 9; slot++) {
    const ci = slotMap[slot] ?? slot;
    const c = cells[ci] || defaultData().days[0].cells[0];
    const cell = document.createElement('div');
    cell.className = 'cell' + (c.completed ? ' done' : '');
    cell.dataset.slot = slot;
    cell.draggable = true;
    cell.addEventListener('dragstart', e => {
      dragSrc = slot;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => cell.classList.add('dragging'), 0);
    });
    cell.addEventListener('dragend', () => {
      cell.classList.remove('dragging');
      document.querySelectorAll('.cell').forEach(x => x.classList.remove('drag-over'));
    });
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      if (dragSrc === null || dragSrc === slot) return;
      swapSlots(dragSrc, slot); dragSrc = null;
    });

    const total = (c.timerMin || 30) * 60;
    const elapsed = c.elapsed || 0;
    const rem = Math.max(0, total - elapsed);
    const pct = total > 0 ? Math.min(100, (elapsed / total) * 100) : 0;
    const remain_pct = 100 - pct;
    const isWarn = rem < total * 0.2 && rem > 0;
    const isDanger = (rem < 60 && rem > 0) || (rem === 0 && elapsed > 0);
    const tcls = isDanger ? 'danger' : isWarn ? 'warn' : '';
    const mm = Math.floor(rem / 60), ss = rem % 60;

    if (c.completed) {
      cell.innerHTML = `
        <div class="cell-label">TASK ${slot+1}</div>
        <div class="task-done-text">${escHtml(c.task || '（無題）')}</div>
        <div class="timer-area">
          <div class="timer-display done-label">${ic('check-circle',15)} 完了</div>
          <div class="timer-controls">
            <button class="btn sm" onclick="restoreTask(${slot})">${ic('back',13)} 戻す</button>
          </div>
        </div>`;
    } else {
      cell.innerHTML = `
        <div class="cell-label">TASK ${slot+1}</div>
        <textarea class="task-input" placeholder="タスクを入力..." data-slot="${slot}">${escHtml(c.task || '')}</textarea>
        <div class="timer-area">
          <div class="timer-bar-wrap"><div class="timer-bar-fill ${tcls}" style="width:${remain_pct}%"></div></div>
          <div class="timer-display ${tcls}">${pad(mm)}:${pad(ss)}</div>
          <div class="timer-controls">
            <input type="number" class="min-input" value="${c.timerMin || 30}" min="1" max="999" data-slot="${slot}" ${c.running?'disabled':''}>
            <span class="min-label">分</span>
            ${!c.running
              ? `<button class="btn sm primary" onclick="startTimer(${slot})">${ic('play',13)} 開始</button>`
              : `<button class="btn sm danger" onclick="pauseTimer(${slot})">${ic('pause',13)} 中断</button>`}
            <button class="btn sm icon-btn" onclick="resetTimer(${slot})" title="リセット">${ic('refresh',13)}</button>
            <button class="btn sm success" onclick="completeTask(${slot})">${ic('check',13)} 完了</button>
          </div>
        </div>`;

      const ta = cell.querySelector('.task-input');
      ta.addEventListener('input', e => { appData.days[currentDay].cells[ci].task = e.target.value; });
      ta.addEventListener('blur', () => saveData());
      const mi = cell.querySelector('.min-input');
      mi.addEventListener('change', e => {
        const v = Math.max(1, parseInt(e.target.value) || 30);
        appData.days[currentDay].cells[ci].timerMin = v;
        appData.days[currentDay].cells[ci].elapsed = 0;
        stopTimer(currentDay, ci);
        appData.days[currentDay].cells[ci].running = false;
        saveData(); renderGrid();
      });
    }
    grid.appendChild(cell);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── SWAP ─── */
function swapSlots(a, b) {
  const cells = appData.days[currentDay].cells;
  const findBySlot = s => cells.findIndex(c => (c.order ?? cells.indexOf(c)) === s);
  const ai = findBySlot(a), bi = findBySlot(b);
  const oa = ai >= 0 ? (cells[ai].order ?? ai) : a;
  const ob = bi >= 0 ? (cells[bi].order ?? bi) : b;
  if (ai >= 0) cells[ai].order = ob;
  if (bi >= 0) cells[bi].order = oa;
  saveData(); renderGrid();
}

/* ─── TIMERS ─── */
function stopTimer(d, ci) {
  const key = `${d}_${ci}`;
  if (timers[key]) { clearInterval(timers[key]); delete timers[key]; }
}
function stopAllTimers() {
  Object.keys(timers).forEach(k => clearInterval(timers[k]));
  timers = {};
}
function runTimer(d, ci) {
  stopTimer(d, ci);
  const key = `${d}_${ci}`;
  timers[key] = setInterval(() => {
    const c = appData.days[d].cells[ci];
    if (!c || c.completed || !c.running) { stopTimer(d, ci); return; }
    c.elapsed = (c.elapsed || 0) + 1;
    if (c.elapsed >= (c.timerMin || 30) * 60) { c.running = false; stopTimer(d, ci); }
    tickSave();
    if (d === currentDay) renderGrid();
  }, 1000);
}
function startRunningTimers() {
  appData.days.forEach((day, d) => {
    day.cells.forEach((c, ci) => {
      if (c.running && !c.completed) runTimer(d, ci);
    });
  });
}
function startTimer(slot) {
  const ci = getCiBySlot(slot);
  appData.days[currentDay].cells[ci].running = true;
  saveData(); runTimer(currentDay, ci); renderGrid();
}
function pauseTimer(slot) {
  const ci = getCiBySlot(slot);
  appData.days[currentDay].cells[ci].running = false;
  stopTimer(currentDay, ci); saveData(); renderGrid();
}
function resetTimer(slot) {
  const ci = getCiBySlot(slot);
  appData.days[currentDay].cells[ci].running = false;
  appData.days[currentDay].cells[ci].elapsed = 0;
  stopTimer(currentDay, ci); saveData(); renderGrid();
}
function completeTask(slot) {
  const ci = getCiBySlot(slot);
  const c = appData.days[currentDay].cells[ci];
  c.running = false; stopTimer(currentDay, ci);
  c.completed = true; c.completedAt = new Date().toISOString();
  const dates = getDates();
  appData.completed.unshift({ task: c.task || '（無題）', completedAt: c.completedAt, dateLabel: fmtDate(dates[currentDay]) });
  saveData(); renderGrid(); renderCompleted();
}
function restoreTask(slot) {
  const ci = getCiBySlot(slot);
  const c = appData.days[currentDay].cells[ci];
  const task = c.task, ca = c.completedAt;
  c.completed = false; c.completedAt = null; c.elapsed = 0; c.running = false;
  const idx = appData.completed.findIndex(x => x.task === task && x.completedAt === ca);
  if (idx >= 0) appData.completed.splice(idx, 1);
  saveData(); renderGrid(); renderCompleted();
}

/* ─── COMPLETED ─── */
function renderCompleted() {
  const el = document.getElementById('completedList');
  if (!appData.completed || appData.completed.length === 0) {
    el.innerHTML = '<p class="empty">完了タスクはありません</p>'; return;
  }
  el.innerHTML = appData.completed.map((item, i) => `
    <div class="c-item">
      <span class="c-check">${ic('check-circle',16)}</span>
      <div class="c-task">${escHtml(item.task || '（無題）')}</div>
      <div class="c-meta">${item.dateLabel || ''}<br>${fmtTime(new Date(item.completedAt))}</div>
      <button class="btn sm icon-btn" onclick="deleteCompleted(${i})" title="削除">${ic('trash',13)}</button>
    </div>`).join('');
}
function deleteCompleted(i) {
  appData.completed.splice(i, 1); saveData(); renderCompleted();
}

/* ─── INIT ─── */
window.addEventListener('load', () => {
  try {
    const saved = localStorage.getItem(CFGKEY);
    if (saved) {
      const cfg = JSON.parse(saved);
      document.getElementById('cfg-apiKey').value = cfg.apiKey || '';
      document.getElementById('cfg-authDomain').value = cfg.authDomain || '';
      document.getElementById('cfg-projectId').value = cfg.projectId || '';
      document.getElementById('cfg-dbUrl').value = cfg.databaseURL || '';
    }
  } catch(e) {}
});
</script>
</body>
